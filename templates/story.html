<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Treasures | Data Story</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        /* Forces a stable container block so the Tableau JS engine doesn't read 0px width */
        .tableau-responsive-container {
            width: 100%;
            max-width: 1016px; /* Configured to match the story layout width */
            margin: 0 auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container my-4">
        <!-- Page Header -->
        <div class="mb-4">
            <h2 class="fw-bold text-dark mb-1">Data Story: Interactive Narrative</h2>
            <p class="text-muted text-capitalize">Heritage treasures: an in-depth analysis of UNESCO world heritage sites in tableau</p>
        </div>

        <!-- Interactive Visualization Card Container -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-3 bg-white rounded">
                <div class="tableau-responsive-container">

                    <!-- Tableau Embed Section Start -->
                    <div class='tableauPlaceholder' id='viz1782282706944' style='position: relative; width: 100%;'>
                        <noscript>
                            <a href='#'>
                                <img alt='Heritage treasures: an in-depth analysis of UNESCO world heritage sites in tableau ' src='https:&#47;&#47;public.tableau.com&#47;static&#47;images&#47;ST&#47;STORY-Heritagetreasuresanin-depthanalysisofUNESCOworldheritagesitesintableau&#47;Story1&#47;1_rss.png' style='border: none' />
                            </a>
                        </noscript>
                        <object class='tableauViz' style='display:none;'>
                            <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' />
                            <param name='embed_code_version' value='3' />
                            <param name='site_root' value='' />
                            <param name='name' value='STORY-Heritagetreasuresanin-depthanalysisofUNESCOworldheritagesitesintableau&#47;Story1' />
                            <param name='tabs' value='no' />
                            <param name='toolbar' value='yes' />
                            <param name='static_image' value='https:&#47;&#47;public.tableau.com&#47;static&#47;images&#47;ST&#47;STORY-Heritagetreasuresanin-depthanalysisofUNESCOworldheritagesitesintableau&#47;Story1&#47;1.png' />
                            <param name='animate_transition' value='yes' />
                            <param name='display_static_image' value='yes' />
                            <param name='display_spinner' value='yes' />
                            <param name='display_overlay' value='yes' />
                            <param name='display_count' value='yes' />
                            <param name='language' value='en-US' />
                        </object>
                    </div>

                    <script type='text/javascript'>
                        // Wrapping inside window.onload prevents layout calculation errors
                        window.onload = function() {
                            var divElement = document.getElementById('viz1782282706944');
                            var vizElement = divElement.getElementsByTagName('object')[0];

                            // Sets dimensions safely after the browser finishes painting the card layout
                            vizElement.style.width='1016px';
                            vizElement.style.height='991px';

                            var scriptElement = document.createElement('script');
                            scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
                            vizElement.parentNode.insertBefore(scriptElement, vizElement);
                        };
                    </script>
                    <!-- Tableau Embed Section End -->

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
