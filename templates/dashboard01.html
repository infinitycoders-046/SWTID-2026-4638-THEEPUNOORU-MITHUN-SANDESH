            max-width: 1000px;
            margin: 0 auto;

            -webkit-overflow-scrolling: touch;

<body>

                    <div class='tableauPlaceholder' id='viz1782282524358' style='position: relative; width: 100%;'>
                        <noscript>

                                <img alt='Heritage treasures: an in-depth analysis of UNESCO world heritage sites in tableau ' src='https:&#47;&#47;public.tableau.com&#47;static&#47;images&#47;DA&#47;DASHBOARD1-Heritagetreasuresanin-depthanalysisofUNESCOworldheritagesitesintableau&#47;Dashboard1&#47;1_rss.png' style='border: none' />

                        </noscript>
                        <object class='tableauViz' style='display:none;'>
                            <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' />
                            <param name='embed_code_version' value='3' />
                            <param name='site_root' value='' />
                            <param name='name' value='DASHBOARD1-Heritagetreasuresanin-depthanalysisofUNESCOworldheritagesitesintableau&#47;Dashboard1' />
                            <param name='tabs' value='no' />
                            <param name='toolbar' value='yes' />
                            <param name='static_image' value='https:&#47;&#47;public.tableau.com&#47;static&#47;images&#47;DA&#47;DASHBOARD1-Heritagetreasuresanin-depthanalysisofUNESCOworldheritagesitesintableau&#47;Dashboard1&#47;1.png' />
                            <param name='animate_transition' value='yes' />
                            <param name='display_static_image' value='yes' />
                            <param name='display_spinner' value='yes' />
                            <param name='display_overlay' value='yes' />
                            <param name='display_count' value='yes' />
                            <param name='language' value='en-US' />
                        </object>
                    </div>

                    <script type='text/javascript'>
                        // Wrapping inside window.onload prevents layout calculation errors
                        window.onload = function() {
                            var divElement = document.getElementById('viz1782282524358');
                            var vizElement = divElement.getElementsByTagName('object')[0];

                            // Safety check: if offsetWidth is 0, fall back to window width or a default 1000px
                            var calculatedWidth = divElement.offsetWidth || window.innerWidth || 1000;

                            if ( calculatedWidth > 800 ) {
                                vizElement.style.width='1000px';
                                vizElement.style.height='827px';
                            } else if ( calculatedWidth > 500 ) {
                                vizElement.style.width='1000px';
                                vizElement.style.height='827px';
                            } else {
                                vizElement.style.width='100%';
                                vizElement.style.height='1577px';
                            }

                            var scriptElement = document.createElement('script');
                            scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
                            vizElement.parentNode.insertBefore(scriptElement, vizElement);
                        };
                    </script>
                    </div>
